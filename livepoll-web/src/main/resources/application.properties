auth-service-api/mp-rest/url=http://localhost:8084
user-service-api/mp-rest/url=http://localhost:8085
poll-service-api/mp-rest/url=http://localhost:8086
poll-read-service-api/mp-rest/url=http://localhost:8087
vote-service-api/mp-rest/url=http://localhost:8088
notification-service-api/mp-rest/url=http://localhost:8089

microprofile.rest.client.disable.default.mapper=true

quarkus.native.resources.includes=*.pem

frontend.url=http://localhost:4200

rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=livepoll-auth

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.credentials=true
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
quarkus.http.port=9095

mp.messaging.incoming.feed-ready.connector=smallrye-rabbitmq
mp.messaging.incoming.feed-ready.exchange.name=feed-ready
mp.messaging.incoming.feed-ready.queue.name=live-poll-web-feed-ready-queue
mp.messaging.incoming.feed-ready.routing-key=feed-ready

mp.messaging.incoming.user-notification.connector=smallrye-rabbitmq
mp.messaging.incoming.user-notification.exchange.name=user-notification
mp.messaging.incoming.user-notification.queue.name=live-poll-web-user-notification-queue
mp.messaging.incoming.user-notification.routing-key=user-notification