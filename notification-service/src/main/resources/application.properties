quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=
quarkus.datasource.password=
quarkus.datasource.jdbc.url=

mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=livepoll-auth

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.credentials=true
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS

quarkus.native.resources.includes=*.pem

quarkus.http.port=8089
%prod.quarkus.http.port=${PORT:8080}

rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

mp.messaging.incoming.poll-vote-cast.connector=smallrye-rabbitmq
mp.messaging.incoming.poll-vote-cast.exchange.name=poll-vote-cast
mp.messaging.incoming.poll-vote-cast.queue.name=notification-service-poll-vote-cast-queue
mp.messaging.incoming.poll-vote-cast.routing-key=poll-vote-cast

mp.messaging.incoming.poll-milestone.connector=smallrye-rabbitmq
mp.messaging.incoming.poll-milestone.exchange.name=poll-milestone
mp.messaging.incoming.poll-milestone.queue.name=notification-service-poll-milestone-queue
mp.messaging.incoming.poll-milestone.routing-key=poll-milestone

mp.messaging.incoming.poll-closed.connector=smallrye-rabbitmq
mp.messaging.incoming.poll-closed.exchange.name=poll-closed
mp.messaging.incoming.poll-closed.queue.name=notification-service-poll-closed-queue
mp.messaging.incoming.poll-closed.routing-key=poll-closed

mp.messaging.incoming.user-deleted.connector=smallrye-rabbitmq
mp.messaging.incoming.user-deleted.exchange.name=user-deleted
mp.messaging.incoming.user-deleted.queue.name=notification-service-user-deleted-queue
mp.messaging.incoming.user-deleted.routing-key=user-deleted

mp.messaging.incoming.user-updated.connector=smallrye-rabbitmq
mp.messaging.incoming.user-updated.exchange.name=user-updated
mp.messaging.incoming.user-updated.queue.name=notification-service-user-updated-queue
mp.messaging.incoming.user-updated.routing-key=user-updated

# Saída (produzir para o BFF)
mp.messaging.outgoing.user-notification.connector=smallrye-rabbitmq
mp.messaging.outgoing.user-notification.exchange.name=user-notification
