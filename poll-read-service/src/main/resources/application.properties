quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=
quarkus.datasource.password=
quarkus.datasource.jdbc.url=
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=livepoll-auth

quarkus.http.port=8087
%prod.quarkus.http.port=${PORT:8080}

quarkus.native.resources.includes=*.pem

# Configuraçőes do RabbitMQ
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

mp.messaging.incoming.poll-created.connector=smallrye-rabbitmq
mp.messaging.incoming.poll-created.exchange.name=poll-created
mp.messaging.incoming.poll-created.queue.name=poll-read-service-poll-created-queue
