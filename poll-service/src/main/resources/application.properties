quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=
quarkus.datasource.password=
quarkus.datasource.jdbc.url=

quarkus.http.port=8086
%prod.quarkus.http.port=${PORT:8080}
quarkus.application.name=poll-service

mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=livepoll-auth

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://localhost:4200
quarkus.http.cors.credentials=true
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS
quarkus.log.category."io.quarkus.vertx.http.cors".level=DEBUG

quarkus.native.resources.includes=*.pem

# Configuraþ§es do RabbitMQ
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

mp.messaging.outgoing.poll-created.connector=smallrye-rabbitmq
mp.messaging.outgoing.poll-created.exchange.name=poll-created
mp.messaging.outgoing.poll-created.routing-key=poll-created

mp.messaging.outgoing.poll-updated.connector=smallrye-rabbitmq
mp.messaging.outgoing.poll-updated.exchange.name=poll-updated
mp.messaging.outgoing.poll-updated.routing-key=poll-updated

mp.messaging.outgoing.poll-closed.connector=smallrye-rabbitmq
mp.messaging.outgoing.poll-closed.exchange.name=poll-closed
mp.messaging.outgoing.poll-closed.routing-key=poll-closed

mp.messaging.outgoing.poll-deleted.connector=smallrye-rabbitmq
mp.messaging.outgoing.poll-deleted.exchange.name=poll-deleted
mp.messaging.outgoing.poll-deleted.routing-key=poll-deleted

mp.messaging.outgoing.option-removed.connector=smallrye-rabbitmq
mp.messaging.outgoing.option-removed.exchange.name=option-removed
mp.messaging.outgoing.option-removed.routing-key=option-removed

mp.messaging.incoming.user-deleted.connector=smallrye-rabbitmq
mp.messaging.incoming.user-deleted.exchange.name=user-deleted
mp.messaging.incoming.user-deleted.queue.name=poll-service-user-deleted-queue
mp.messaging.incoming.user-deleted.routing-key=user-deleted

mp.messaging.incoming.user-updated.connector=smallrye-rabbitmq
mp.messaging.incoming.user-updated.exchange.name=user-updated
mp.messaging.incoming.user-updated.queue.name=poll-service-user-updated-queue
mp.messaging.incoming.user-updated.routing-key=user-updated